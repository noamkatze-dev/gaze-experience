<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Eye Scan</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

  #vid {
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; z-index:0;
  }

  #labelCanvas {
    position:fixed; inset:0; z-index:1; pointer-events:none;
  }

  #cam {
    position:fixed; opacity:0; pointer-events:none;
    width:1px; height:1px;
  }

  #intro {
    position:fixed; inset:0; background:#000;
    z-index:999; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
    transition: opacity 0.8s ease;
  }

  #intro-msg.ok { color:#e03a2e; }

  #hud {
    position:fixed; bottom:14px; left:14px; z-index:10;
    font-size:7px; color:rgba(224,58,46,.25);
  }
</style>
</head>
<body>

<video id="vid" loop muted playsinline autoplay>
  <source src="Roman_Statue_Rotation_Video.mp4" type="video/mp4">
</video>

<video id="cam" autoplay playsinline muted></video>
<canvas id="labelCanvas"></canvas>

<div id="intro">
  <div>Eye Scan — Vision System</div>
  <div id="intro-msg">טוענת מודל...</div>
</div>

<div id="hud">
  <div id="h1">LOADING</div>
  <div id="h2">IRIS — —</div>
  <div id="h3">EDGES 0</div>
</div>

<script type="module">
import vision from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
const { FaceLandmarker, FilesetResolver } = vision;

const REVEAL_R=140, SMOOTH=0.08, EDGE_STEP=5, EDGE_THR=180, LABEL_EVERY=55;

let irisOK=false, irisRawX=0, irisRawY=0;
let smoothX=-1, smoothY=-1;
let faceLandmarker=null;
let edgeLabels=[];

const vidEl=document.getElementById('vid');
const camEl=document.getElementById('cam');
const canvas=document.getElementById('labelCanvas');
const ctx=canvas.getContext('2d');

canvas.width=innerWidth;
canvas.height=innerHeight;
window.addEventListener('resize',()=>{
  canvas.width=innerWidth;
  canvas.height=innerHeight;
});

async function loadModel(){
  const fs=await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
  );
  faceLandmarker=await FaceLandmarker.createFromOptions(fs,{
    baseOptions:{
      modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate:"GPU"
    },
    runningMode:"VIDEO",
    numFaces:1
  });
}

async function startCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({video:true});
  camEl.srcObject=stream;
  await new Promise(r=>camEl.onloadeddata=r);
}

let lastCamTime=-1;
function detectLoop(){
  if(faceLandmarker && lastCamTime!==camEl.currentTime){
    lastCamTime=camEl.currentTime;
    const res=faceLandmarker.detectForVideo(camEl,performance.now());
    processEye(res);
  }
  requestAnimationFrame(detectLoop);
}

function processEye(res){
  if(!res.faceLandmarks?.length){irisOK=false;return;}
  const lm=res.faceLandmarks[0];
  if(lm.length<478){irisOK=false;return;}
  irisOK=true;

  const LI=[468,469,470,471,472], RI=[473,474,475,476,477];
  const lIx=LI.reduce((s,i)=>s+lm[i].x,0)/5;
  const lIy=LI.reduce((s,i)=>s+lm[i].y,0)/5;
  const rIx=RI.reduce((s,i)=>s+lm[i].x,0)/5;
  const rIy=RI.reduce((s,i)=>s+lm[i].y,0)/5;

  const lEW=Math.abs(lm[133].x-lm[33].x)||.001;
  const rEW=Math.abs(lm[263].x-lm[362].x)||.001;
  const lEH=Math.abs(lm[145].y-lm[159].y)||.001;
  const rEH=Math.abs(lm[374].y-lm[386].y)||.001;

  irisRawX=-((lIx-(lm[33].x+lm[133].x)/2)/lEW+(rIx-(lm[362].x+lm[263].x)/2)/rEW)/2;
  irisRawY=((lIy-(lm[159].y+lm[145].y)/2)/lEH+(rIy-(lm[386].y+lm[374].y)/2)/rEH)/2;

  const tx=canvas.width*(0.5-irisRawX*1.6);
  const ty=canvas.height*(0.5+irisRawY*2.2);

  if(smoothX<0){smoothX=tx;smoothY=ty;}
  smoothX+=(tx-smoothX)*SMOOTH;
  smoothY+=(ty-smoothY)*SMOOTH;
}

const offCanvas=document.createElement('canvas');
const offCtx=offCanvas.getContext('2d');

function analyzeEdges(){
  const vw=vidEl.videoWidth, vh=vidEl.videoHeight;
  if(!vw) return;

  offCanvas.width=vw; offCanvas.height=vh;
  offCtx.drawImage(vidEl,0,0);
  const pixels=offCtx.getImageData(0,0,vw,vh).data;

  function br(x,y){
    const i=(y*vw+x)*4;
    return (pixels[i]+pixels[i+1]+pixels[i+2])/3;
  }

  const labels=[];
  let count=0,n=0;

  for(let y=EDGE_STEP;y<vh-EDGE_STEP;y+=EDGE_STEP){
    for(let x=EDGE_STEP;x<vw-EDGE_STEP;x+=EDGE_STEP){
      const gx=br(x+1,y)-br(x-1,y);
      const gy=br(x,y+1)-br(x,y-1);
      const mag=Math.sqrt(gx*gx+gy*gy);

      if(mag>EDGE_THR){
        if(n%LABEL_EVERY===0){
          const sx=x/vw*canvas.width;
          const sy=y/vh*canvas.height;

          labels.push({
            x:sx,y:sy,
            txt:"DATA",
            state:'hidden',
            lastSeen:0
          });
        }
        n++; count++;
      }
    }
  }

  edgeLabels=labels;
}

let frame=0;

function drawLoop(){
  requestAnimationFrame(drawLoop);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!irisOK) return;

  const now=performance.now();

  // עדכון מצבים
  for(const lb of edgeLabels){
    const d=Math.hypot(lb.x-smoothX,lb.y-smoothY);

    if(d<REVEAL_R){
      lb.state='active';
      lb.lastSeen=now;
    }else if(lb.state==='active'){
      lb.state='visited';
    }
  }

  ctx.font='6px Courier New';
  ctx.textAlign='center';

  for(const lb of edgeLabels){

    if(lb.state==='hidden') continue;

    const d=Math.hypot(lb.x-smoothX,lb.y-smoothY);

    if(lb.state==='active' && d<REVEAL_R){
      ctx.fillStyle='rgba(255,0,0,1)';
      ctx.shadowColor='red';
      ctx.shadowBlur=10;
      ctx.filter='none';
    }else{
      ctx.fillStyle='rgba(224,58,46,0.3)';
      ctx.shadowBlur=0;
      ctx.filter='blur(2px)';
    }

    ctx.fillText(lb.txt,lb.x,lb.y);
  }

  ctx.filter='none';

  // סמן מבט
  ctx.beginPath();
  ctx.arc(smoothX,smoothY,REVEAL_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,0,0,0.2)';
  ctx.stroke();

  frame++;
  if(frame%12===0) analyzeEdges();
}

(async()=>{
  await loadModel();
  await startCamera();
  vidEl.play();
  detectLoop();
  drawLoop();
})();
</script>
</body>
</html>
