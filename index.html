<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Analysis</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  cursor: none;
}

#scene {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#videoWrapper {
  position: relative;
  overflow: hidden;
}

#mainVideo {
  display: block;
  width: 100%;
  height: 100%;
}

#annLayer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.ann {
  position: absolute;
  font-family: 'Courier New', Courier, monospace;
  font-size: 9px;
  font-weight: 700;
  color: #ff1500;
  letter-spacing: 0.07em;
  white-space: nowrap;
  text-shadow: 0 0 6px rgba(255, 21, 0, 0.65);
  transform: translate(-50%, -50%);
  pointer-events: none;
  opacity: 0;
}

#gazeDot {
  position: fixed;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid rgba(255, 20, 0, 0.4);
  box-shadow: 0 0 10px rgba(255, 20, 0, 0.12);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 999;
}

#webcamEl {
  position: fixed;
  bottom: 8px;
  right: 8px;
  width: 96px;
  height: 72px;
  opacity: 0.07;
  transform: scaleX(-1);
  border: 1px solid #0f0f0f;
}

#info {
  position: fixed;
  bottom: 11px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: #252525;
  pointer-events: none;
  transition: opacity 2s ease;
  white-space: nowrap;
}
</style>
</head>
<body>

<div id="scene">
  <div id="videoWrapper">
    <video id="mainVideo"
           src="Roman_Statue_Rotation_Video.mp4"
           autoplay loop muted playsinline></video>
    <div id="annLayer"></div>
  </div>
</div>

<div id="gazeDot"></div>
<video id="webcamEl" autoplay muted playsinline></video>
<div id="info">ALLOW CAMERA ACCESS — GAZE REVEALS ANALYSIS</div>

<canvas id="anaC" style="display:none" width="160" height="90"></canvas>
<canvas id="preC" style="display:none" width="160" height="90"></canvas>

<script type="module">
'use strict';

import { FaceLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

/* ── constants ─────────────────────────────────────────────────────── */
const W_ANA        = 160;
const H_ANA        = 90;
const N_ANN        = 40;
const ANA_INTERVAL = 1150;   // ms between analysis passes
const REVEAL_FRAC  = 0.09;   // gaze reveal radius as fraction of min(W,H)
const BLUR_SCALE   = 0.052;  // blur = dist / (min(W,H) * BLUR_SCALE)
const MAX_BLUR     = 8;      // px cap
const GAZE_LERP    = 0.13;   // exponential smooth factor
const EYE_SCALE    = 3.5;    // amplify iris-in-eye offset → screen coords

/* ── DOM ───────────────────────────────────────────────────────────── */
const mainVideo    = document.getElementById('mainVideo');
const videoWrapper = document.getElementById('videoWrapper');
const annLayer     = document.getElementById('annLayer');
const gazeDot      = document.getElementById('gazeDot');
const webcamEl     = document.getElementById('webcamEl');
const infoEl       = document.getElementById('info');
const anaC         = document.getElementById('anaC');
const preC         = document.getElementById('preC');
const anaCtx = anaC.getContext('2d', { willReadFrequently: true });
const preCtx = preC.getContext('2d', { willReadFrequently: true });

/* ── state ─────────────────────────────────────────────────────────── */
let pool      = [];
let prevPx    = null;
let rawGX     = 0.5;
let rawGY     = 0.5;
let sGX       = 0.5;
let sGY       = 0.5;
let gazeOn    = false;
let lastAnaTs = -9999;

/* ── annotation pool ────────────────────────────────────────────────── */
function buildPool() {
  annLayer.innerHTML = '';
  pool = [];
  for (let i = 0; i < N_ANN; i++) {
    const el = document.createElement('span');
    el.className = 'ann';
    annLayer.appendChild(el);
    pool.push({ el, x: 0.5, y: 0.5, revealed: false });
  }
}

/* ── video wrapper sizing ────────────────────────────────────────────── */
function sizeWrapper() {
  const vw = mainVideo.videoWidth  || 16;
  const vh = mainVideo.videoHeight || 9;
  const ar = vw / vh;
  const ww = window.innerWidth, wh = window.innerHeight;
  if (ww / wh >= ar) {
    videoWrapper.style.height = wh + 'px';
    videoWrapper.style.width  = (wh * ar) + 'px';
  } else {
    videoWrapper.style.width  = ww + 'px';
    videoWrapper.style.height = (ww / ar) + 'px';
  }
}

/* ── Sobel edge detection ────────────────────────────────────────────── */
function sobel(px, w, h) {
  const g = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const o = i * 4;
    g[i] = 0.299 * px[o] + 0.587 * px[o + 1] + 0.114 * px[o + 2];
  }
  const gx = new Float32Array(w * h);
  const gy = new Float32Array(w * h);
  const mg = new Float32Array(w * h);
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const i  = y * w + x;
      const tl = g[i-w-1], tc = g[i-w], tr = g[i-w+1];
      const ml = g[i-1],                mr = g[i+1];
      const bl = g[i+w-1], bc = g[i+w], br = g[i+w+1];
      gx[i] = (tr + 2*mr + br) - (tl + 2*ml + bl);
      gy[i] = (bl + 2*bc + br) - (tl + 2*tc + tr);
      mg[i] = Math.hypot(gx[i], gy[i]);
    }
  }
  return { gx, gy, mg };
}

/* ── region brightness / contrast / saturation ──────────────────────── */
function rStats(px, w, h, nx0, ny0, nx1, ny1) {
  const x0 = Math.max(0, Math.floor(nx0 * w));
  const y0 = Math.max(0, Math.floor(ny0 * h));
  const x1 = Math.min(w - 1, Math.floor(nx1 * w));
  const y1 = Math.min(h - 1, Math.floor(ny1 * h));
  let sL = 0, sL2 = 0, sS = 0, n = 0;
  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      const o  = (y * w + x) * 4;
      const r  = px[o]     / 255;
      const gr = px[o + 1] / 255;
      const b  = px[o + 2] / 255;
      const mx = Math.max(r, gr, b), mn = Math.min(r, gr, b);
      const l  = (mx + mn) * 0.5;
      const s  = (mx === mn) ? 0 : (mx - mn) / (1 - Math.abs(2 * l - 1));
      sL += l; sL2 += l * l; sS += s; n++;
    }
  }
  if (!n) return { bright: 128, contrast: 0, sat: 0 };
  const al = sL / n;
  return {
    bright:   Math.round(al * 255),
    contrast: Math.round(Math.sqrt(Math.max(0, sL2 / n - al * al)) * 255),
    sat:      Math.round(sS / n * 100)
  };
}

/* ── frame-to-frame motion score for a region ────────────────────────── */
function rMotion(px, prev, w, h, nx0, ny0, nx1, ny1) {
  if (!prev) return 0;
  const x0 = Math.max(0, Math.floor(nx0 * w));
  const y0 = Math.max(0, Math.floor(ny0 * h));
  const x1 = Math.min(w - 1, Math.floor(nx1 * w));
  const y1 = Math.min(h - 1, Math.floor(ny1 * h));
  let d = 0, n = 0;
  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      const o = (y * w + x) * 4;
      d += Math.abs(px[o]     - prev[o])
         + Math.abs(px[o + 1] - prev[o + 1])
         + Math.abs(px[o + 2] - prev[o + 2]);
      n += 3;
    }
  }
  return n ? d / n : 0;
}

/* ── compose label from analysis results ─────────────────────────────── */
function makeLabel(dir, mag, st, mv) {
  if (mv > 38)            return `CRITICAL / MOTION_FAST`;
  if (mv > 16) {
    const s = Math.min(99, Math.max(10, Math.round(99 - mv * 2.4)));
    return `${dir} / STAB_${s}%`;
  }
  if (st.contrast > 52)   return `${dir} / CONTRAST_HIGH`;
  if (st.bright   > 178)  return `DETAIL / BRIGHT_${st.bright}`;
  if (st.bright   < 42)   return `DETAIL / DARK_${st.bright}`;
  if (mag         > 210)  return `${dir} / SHARP_${Math.round(mag / 3)}`;
  if (st.sat      > 42)   return `${dir} / SAT_${st.sat}%`;
  if (st.contrast > 22)   return `${dir} / CONTRAST_${st.contrast}`;
  return `STABLE / EDGE_${Math.round(mag)}`;
}

/* ── full frame analysis pass ────────────────────────────────────────── */
function analyze() {
  if (mainVideo.readyState < 2) return;

  anaCtx.drawImage(mainVideo, 0, 0, W_ANA, H_ANA);
  const id = anaCtx.getImageData(0, 0, W_ANA, H_ANA);
  const px = id.data;

  const { gx, gy, mg } = sobel(px, W_ANA, H_ANA);

  const COLS = 7, ROWS = 6;
  const pts  = [];

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x0 = Math.floor(c * W_ANA / COLS) + 1;
      const y0 = Math.floor(r * H_ANA / ROWS) + 1;
      const x1 = Math.floor((c + 1) * W_ANA / COLS) - 1;
      const y1 = Math.floor((r + 1) * H_ANA / ROWS) - 1;

      let best = 0, bi = -1;
      for (let y = y0; y <= y1; y++)
        for (let x = x0; x <= x1; x++) {
          const i = y * W_ANA + x;
          if (mg[i] > best) { best = mg[i]; bi = i; }
        }

      if (best < 16 || bi < 0) continue;

      const bx = bi % W_ANA;
      const by = Math.floor(bi / W_ANA);
      const nx = bx / W_ANA;
      const ny = by / H_ANA;
      const m  = 0.07;
      const st = rStats(px,    W_ANA, H_ANA, nx-m, ny-m, nx+m, ny+m);
      const mv = rMotion(px, prevPx, W_ANA, H_ANA, nx-m, ny-m, nx+m, ny+m);

      const agx = Math.abs(gx[bi]), agy = Math.abs(gy[bi]);
      const a   = ((Math.atan2(gy[bi], gx[bi]) * 180 / Math.PI) % 180 + 180) % 180;
      let dir;
      if (agx > 90 && agy > 90)    dir = 'CORNER';
      else if (a < 25 || a >= 155) dir = 'HORIZONTAL';
      else if (a >= 65 && a < 115) dir = 'VERTICAL';
      else                         dir = 'DIAGONAL';

      const jx = nx + (Math.sin(nx * 137.5 + ny * 43.7) * 0.025);
      const jy = ny + (Math.cos(ny * 98.3  + nx * 61.1) * 0.025);

      pts.push({
        nx:    Math.max(0.01, Math.min(0.99, jx)),
        ny:    Math.max(0.01, Math.min(0.99, jy)),
        label: makeLabel(dir, best, st, mv)
      });
    }
  }

  const n = Math.min(pts.length, N_ANN);
  for (let i = 0; i < N_ANN; i++) {
    const a = pool[i];
    if (i < n) {
      const p = pts[i];
      if (!a.revealed) {
        a.x = p.nx;
        a.y = p.ny;
        a.el.style.left = (p.nx * 100).toFixed(2) + '%';
        a.el.style.top  = (p.ny * 100).toFixed(2) + '%';
      }
      a.el.textContent = p.label;
    } else {
      a.el.textContent = '';
    }
  }

  preCtx.drawImage(mainVideo, 0, 0, W_ANA, H_ANA);
  prevPx = preCtx.getImageData(0, 0, W_ANA, H_ANA).data.slice();
}

/* ── per-frame gaze reveal effect ────────────────────────────────────── */
function applyGaze() {
  sGX += (rawGX - sGX) * GAZE_LERP;
  sGY += (rawGY - sGY) * GAZE_LERP;

  const W = videoWrapper.offsetWidth;
  const H = videoWrapper.offsetHeight;
  if (!W || !H) return;

  const gpx = sGX * W;
  const gpy = sGY * H;

  const rect = videoWrapper.getBoundingClientRect();
  gazeDot.style.left = (rect.left + gpx) + 'px';
  gazeDot.style.top  = (rect.top  + gpy) + 'px';

  const revR = Math.min(W, H) * REVEAL_FRAC;
  const bsca = Math.min(W, H) * BLUR_SCALE;

  for (const a of pool) {
    if (!a.el.textContent) continue;
    const ax = a.x * W;
    const ay = a.y * H;
    const d  = Math.hypot(ax - gpx, ay - gpy);
    if (d < revR) a.revealed = true;
    if (a.revealed) {
      a.el.style.opacity = '1';
      a.el.style.filter  = `blur(${Math.min(MAX_BLUR, d / bsca).toFixed(2)}px)`;
    }
  }
}

/* ── main render loop ────────────────────────────────────────────────── */
function mainLoop(ts) {
  applyGaze();
  if (ts - lastAnaTs > ANA_INTERVAL) {
    analyze();
    lastAnaTs = ts;
  }
  requestAnimationFrame(mainLoop);
}

/* ── MediaPipe iris tracking ─────────────────────────────────────────── */
async function startEyeTracking() {
  let fl;
  try {
    const fs = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    fl = await FaceLandmarker.createFromOptions(fs, {
      baseOptions: {
        modelAssetPath:
          'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU'
      },
      outputFaceBlendshapes: false,
      runningMode: 'VIDEO',
      numFaces: 1
    });
  } catch (e) {
    console.warn('[gaze] FaceLandmarker init failed:', e);
    return false;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } }
    });
    webcamEl.srcObject = stream;
    await new Promise(r => { webcamEl.onloadeddata = r; });
  } catch (e) {
    console.warn('[gaze] Webcam unavailable:', e);
    return false;
  }

  let lastCamT = -1;
  function trackIris() {
    if (webcamEl.readyState >= 2 && webcamEl.currentTime !== lastCamT) {
      lastCamT = webcamEl.currentTime;
      try {
        const res = fl.detectForVideo(webcamEl, performance.now());
        if (res.faceLandmarks?.length > 0) {
          const lm = res.faceLandmarks[0];
          if (lm.length > 473) {
            // Eye corner landmarks:
            //   Left eye  — outer:33, inner:133, top:159, bottom:145, iris:468
            //   Right eye — inner:362, outer:263, top:386, bottom:374, iris:473
            const lOuter = lm[33],  lInner = lm[133];
            const lTop   = lm[159], lBot   = lm[145];
            const rInner = lm[362], rOuter = lm[263];
            const rTop   = lm[386], rBot   = lm[374];
            const lIris  = lm[468], rIris  = lm[473];

            // Eye centers and sizes
            const lCX = (lOuter.x + lInner.x) / 2;
            const lCY = (lTop.y   + lBot.y)   / 2;
            const lEW = Math.abs(lInner.x - lOuter.x) || 0.01;
            const lEH = Math.abs(lBot.y   - lTop.y)   || 0.01;

            const rCX = (rOuter.x + rInner.x) / 2;
            const rCY = (rTop.y   + rBot.y)   / 2;
            const rEW = Math.abs(rOuter.x - rInner.x) || 0.01;
            const rEH = Math.abs(rBot.y   - rTop.y)   || 0.01;

            // Iris offset relative to eye center, normalized by eye size.
            // Head translation moves corners + iris together → offset stays ~0.
            // Only eyeball rotation changes the offset.
            const offX = ((lIris.x - lCX) / lEW + (rIris.x - rCX) / rEW) / 2;
            const offY = ((lIris.y - lCY) / lEH + (rIris.y - rCY) / rEH) / 2;

            rawGX = Math.max(0, Math.min(1, 0.5 - offX * EYE_SCALE));
            rawGY = Math.max(0, Math.min(1, 0.5 + offY * EYE_SCALE));

            if (!gazeOn) {
              gazeOn = true;
              infoEl.style.opacity = '0';
            }
          }
        }
      } catch (_) { /* frame skip */ }
    }
    requestAnimationFrame(trackIris);
  }
  requestAnimationFrame(trackIris);
  return true;
}

/* ── mouse / touch fallback ──────────────────────────────────────────── */
function enablePointerFallback() {
  infoEl.textContent = 'MOVE MOUSE OVER VIDEO · GAZE REVEALS ANALYSIS';

  const onMove = (cx, cy) => {
    const rect = videoWrapper.getBoundingClientRect();
    const nx = (cx - rect.left) / rect.width;
    const ny = (cy - rect.top)  / rect.height;
    if (nx >= 0 && nx <= 1 && ny >= 0 && ny <= 1) {
      rawGX = nx; rawGY = ny;
      if (!gazeOn) { gazeOn = true; infoEl.style.opacity = '0'; }
    }
  };

  document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  document.addEventListener('touchmove', e => {
    e.preventDefault();
    onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
}

/* ── boot ────────────────────────────────────────────────────────────── */
async function boot() {
  buildPool();
  sizeWrapper();
  mainVideo.addEventListener('loadedmetadata', sizeWrapper);
  window.addEventListener('resize', sizeWrapper);

  if (mainVideo.readyState < 2)
    await new Promise(r => mainVideo.addEventListener('canplay', r, { once: true }));

  analyze();
  requestAnimationFrame(mainLoop);

  const ok = await startEyeTracking();
  if (!ok) enablePointerFallback();
}

boot();
</script>
</body>
</html>
