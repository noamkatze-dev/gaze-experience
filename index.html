<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Eye Scan</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

  #vid {
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; z-index:0;
  }

  /* קנבס היסטוריה — טקסטים שכבר נחשפו, מטושטשים */
  #historyCanvas {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    filter: blur(2.5px);
  }

  /* קנבס פעיל — נקודה נוכחית, חד */
  #labelCanvas {
    position:fixed; inset:0; z-index:2; pointer-events:none;
  }

  #cam {
    position:fixed; opacity:0; pointer-events:none;
    width:1px; height:1px; top:0; left:0;
  }

  #intro {
    position:fixed; inset:0; background:#000;
    z-index:999; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
    transition: opacity 0.8s ease;
  }
  #intro-title {
    font-size:9px; letter-spacing:.4em; color:#333;
    text-transform:uppercase;
  }
  #intro-msg {
    font-size:8px; color:#222; letter-spacing:.15em;
    text-align:center; line-height:2.4; text-transform:uppercase;
  }
  #intro-msg.ok { color:#e03a2e; }

  #hud {
    position:fixed; bottom:14px; left:14px; z-index:10;
    font-size:7px; color:rgba(224,58,46,.25);
    letter-spacing:.15em; line-height:2.4;
    pointer-events:none; text-transform:uppercase;
  }
</style>
</head>
<body>

<video id="vid" loop muted playsinline autoplay>
  <source src="Roman_Statue_Rotation_Video.mp4" type="video/mp4">
</video>

<video id="cam" autoplay playsinline muted></video>

<!-- קנבס היסטוריה (מטושטש) -->
<canvas id="historyCanvas"></canvas>

<!-- קנבס פעיל (חד) -->
<canvas id="labelCanvas"></canvas>

<div id="intro">
  <div id="intro-title">Eye Scan — Vision System</div>
  <div id="intro-msg">טוענת מודל...</div>
</div>

<div id="hud">
  <div id="h1">LOADING</div>
  <div id="h2">IRIS — —</div>
  <div id="h3">EDGES 0</div>
</div>

<script type="module">
import vision from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
const { FaceLandmarker, FilesetResolver } = vision;

// ── קבועים ──
const REVEAL_R     = 140;   // רדיוס גילוי פעיל
const HISTORY_R    = 80;    // רדיוס שמירת היסטוריה
const SMOOTH       = 0.08;
const EDGE_STEP    = 5;
const EDGE_THR     = 180;
const LABEL_EVERY  = 55;
const SENS_X       = 8.0;
const SENS_Y       = 8.0;
// כמה זמן (ms) העין צריכה להישאר במקום לפני שמוסיפים להיסטוריה
const DWELL_TIME   = 600;
// מרחק מינימלי בין נקודות היסטוריה (פיקסלים)
const MIN_HIST_DIST = 60;

// ── מצב ──
let irisOK   = false;
let smoothX  = -1, smoothY = -1;
let faceLandmarker = null;
let edgeLabels = [];

// היסטוריה: כל נקודה שנחשפה — { x, y, labels: [{x,y,txt}] }
let history = [];
let dwellStart = null;
let lastHistX = -9999, lastHistY = -9999;

// ── אלמנטים ──
const vidEl        = document.getElementById('vid');
const camEl        = document.getElementById('cam');
const introEl      = document.getElementById('intro');
const msgEl        = document.querySelector('#intro-msg');
const canvas       = document.getElementById('labelCanvas');
const ctx          = canvas.getContext('2d');
const histCanvas   = document.getElementById('historyCanvas');
const histCtx      = histCanvas.getContext('2d');

// קנבס ביניים — מצלמה הפוכה
const flipCanvas   = document.createElement('canvas');
flipCanvas.width   = 640;
flipCanvas.height  = 480;
const flipCtx      = flipCanvas.getContext('2d', { willReadFrequently: true });

function setMsg(txt, ok=false) {
  msgEl.textContent = txt;
  msgEl.className   = ok ? 'ok' : '';
}

function resize() {
  canvas.width     = window.innerWidth;
  canvas.height    = window.innerHeight;
  histCanvas.width  = window.innerWidth;
  histCanvas.height = window.innerHeight;
  // מחדש ציור היסטוריה אחרי שינוי גודל
  redrawHistory();
}
resize();
window.addEventListener('resize', resize);

// ── טעינת מודל ──
async function loadModel() {
  const fs = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(fs, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numFaces: 1,
    outputFaceBlendshapes: false,
  });
}

// ── מצלמה ──
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width:640, height:480, facingMode:'user' }
  });
  camEl.srcObject = stream;
  await new Promise(r => camEl.addEventListener('loadeddata', r, { once:true }));
}

// ── לולאת זיהוי ──
let lastCamTime = -1;
function detectLoop() {
  if (faceLandmarker && camEl.readyState >= 2 && lastCamTime !== camEl.currentTime) {
    lastCamTime = camEl.currentTime;

    flipCtx.save();
    flipCtx.scale(-1, 1);
    flipCtx.drawImage(camEl, -640, 0, 640, 480);
    flipCtx.restore();

    const res = faceLandmarker.detectForVideo(flipCanvas, performance.now());
    processEye(res);
  }
  requestAnimationFrame(detectLoop);
}

function processEye(res) {
  if (!res.faceLandmarks?.length) { irisOK=false; return; }
  const lm = res.faceLandmarks[0];
  if (lm.length < 478) { irisOK=false; return; }
  irisOK = true;

  const LI=[468,469,470,471,472], RI=[473,474,475,476,477];
  const lIx = LI.reduce((s,i) => s + lm[i].x, 0) / 5;
  const lIy = LI.reduce((s,i) => s + lm[i].y, 0) / 5;
  const rIx = RI.reduce((s,i) => s + lm[i].x, 0) / 5;
  const rIy = RI.reduce((s,i) => s + lm[i].y, 0) / 5;

  const lEW = Math.abs(lm[133].x - lm[33].x)  || .001;
  const rEW = Math.abs(lm[263].x - lm[362].x) || .001;
  const lEH = Math.abs(lm[145].y - lm[159].y) || .001;
  const rEH = Math.abs(lm[374].y - lm[386].y) || .001;

  const rawX = ((lIx - (lm[33].x+lm[133].x)/2) / lEW + (rIx - (lm[362].x+lm[263].x)/2) / rEW) / 2;
  const rawY = ((lIy - (lm[159].y+lm[145].y)/2) / lEH + (rIy - (lm[386].y+lm[374].y)/2) / rEH) / 2;

  const targetX = canvas.width  * 0.5 + rawX * canvas.width  * SENS_X;
  const targetY = canvas.height * 0.5 + rawY * canvas.height * SENS_Y;

  if (smoothX < 0) { smoothX=targetX; smoothY=targetY; }
  smoothX += (targetX - smoothX) * SMOOTH;
  smoothY += (targetY - smoothY) * SMOOTH;

  document.getElementById('h1').textContent = 'IRIS ●';
  document.getElementById('h2').textContent = `IRIS  ${rawX.toFixed(3)}  ${rawY.toFixed(3)}`;

  // ── בדיקת dwell — האם העין עמדה מספיק זמן? ──
  const distFromLastHist = Math.hypot(smoothX - lastHistX, smoothY - lastHistY);
  if (distFromLastHist > MIN_HIST_DIST) {
    // העין זזה — אפס טיימר
    dwellStart = performance.now();
  } else if (dwellStart !== null && performance.now() - dwellStart > DWELL_TIME) {
    // עמדה מספיק — הוסף להיסטוריה
    addToHistory(smoothX, smoothY);
    lastHistX = smoothX;
    lastHistY = smoothY;
    dwellStart = null;
  }
}

// ── הוספת נקודה להיסטוריה ──
function addToHistory(hx, hy) {
  // לקח את הטקסטים הקרובים לנקודה הנוכחית
  const nearby = edgeLabels.filter(lb =>
    Math.hypot(lb.x - hx, lb.y - hy) < HISTORY_R
  );
  if (nearby.length === 0) return;

  history.push({ x: hx, y: hy, labels: nearby });
  redrawHistory();
}

// ── ציור מחדש של קנבס ההיסטוריה ──
function redrawHistory() {
  histCtx.clearRect(0, 0, histCanvas.width, histCanvas.height);

  for (const pt of history) {
    histCtx.font = '6px Courier New';
    histCtx.textAlign = 'center';
    for (const lb of pt.labels) {
      const dist  = Math.hypot(lb.x - pt.x, lb.y - pt.y);
      const alpha = Math.max(0, 1 - dist / HISTORY_R) * 0.45; // דהוי יותר
      histCtx.fillStyle = `rgba(224,58,46,${alpha})`;
      histCtx.fillText(lb.txt, lb.x, lb.y);
    }
  }
}

// ── ניתוח קצוות ──
const offCanvas = document.createElement('canvas');
const offCtx    = offCanvas.getContext('2d', { willReadFrequently: true });

function analyzeEdges() {
  if (vidEl.readyState < 2) return;
  const vw=vidEl.videoWidth, vh=vidEl.videoHeight;
  if (!vw||!vh) return;

  offCanvas.width=vw; offCanvas.height=vh;
  offCtx.drawImage(vidEl,0,0,vw,vh);
  const pixels = offCtx.getImageData(0,0,vw,vh).data;

  function br(x,y) {
    if (x<0||x>=vw||y<0||y>=vh) return 0;
    const i=(Math.floor(y)*vw+Math.floor(x))*4;
    return (pixels[i]+pixels[i+1]+pixels[i+2])/3;
  }

  let tb=0, sb=0;
  for(let y=0;y<vh;y+=20) for(let x=0;x<vw;x+=20){tb+=br(x,y);sb++;}
  const avgB = sb?Math.floor(tb/sb):128;
  const cLbl = avgB>150?'HIGH':avgB>90?'MED':'LOW';

  let motionLbl = 'STATIC';
  if (analyzeEdges._prevPixels) {
    let diff=0, n=0;
    for(let i=0;i<pixels.length;i+=40){diff+=Math.abs(pixels[i]-analyzeEdges._prevPixels[i]);n++;}
    motionLbl = diff/n>20?'FAST':diff/n>5?'SLOW':'STATIC';
  }
  analyzeEdges._prevPixels = new Uint8ClampedArray(pixels);

  const labels=[];
  let edgeCount=0, sampleN=0;
  const W=canvas.width, H=canvas.height;

  for(let y=EDGE_STEP;y<vh-EDGE_STEP;y+=EDGE_STEP){
    for(let x=EDGE_STEP;x<vw-EDGE_STEP;x+=EDGE_STEP){
      const gx =
        -br(x-EDGE_STEP,y-EDGE_STEP)+br(x+EDGE_STEP,y-EDGE_STEP)
        -2*br(x-EDGE_STEP,y)+2*br(x+EDGE_STEP,y)
        -br(x-EDGE_STEP,y+EDGE_STEP)+br(x+EDGE_STEP,y+EDGE_STEP);
      const gy =
        -br(x-EDGE_STEP,y-EDGE_STEP)-2*br(x,y-EDGE_STEP)-br(x+EDGE_STEP,y-EDGE_STEP)
        +br(x-EDGE_STEP,y+EDGE_STEP)+2*br(x,y+EDGE_STEP)+br(x+EDGE_STEP,y+EDGE_STEP);
      const mag=Math.sqrt(gx*gx+gy*gy);

      if(mag>EDGE_THR){
        edgeCount++;
        if(sampleN % LABEL_EVERY === 0){
          const angDeg = Math.atan2(gy,gx)*180/Math.PI;
          let lbl;
          if(angDeg>45&&angDeg<135)                           lbl=`VERTICAL / CONTRAST_${cLbl}`;
          else if(Math.abs(angDeg)<20||Math.abs(angDeg)>160) lbl=`HORIZONTAL / STAB_${Math.floor(Math.random()*15+85)}%`;
          else if(mag>210)                                     lbl=`CRITICAL / MOTION_${motionLbl}`;
          else                                                 lbl=`DETAIL / BRIGHT_${avgB}`;

          const canvasRatio=W/H, videoRatio=vw/vh;
          let dw,dh,ox,oy;
          if(videoRatio>canvasRatio){dh=H;dw=videoRatio*dh;ox=(W-dw)/2;oy=0;}
          else{dw=W;dh=dw/videoRatio;ox=0;oy=(H-dh)/2;}
          labels.push({ x: ox+(x/vw)*dw, y: oy+(y/vh)*dh, txt: lbl.toUpperCase() });
        }
        sampleN++;
      }
    }
  }

  edgeLabels = labels;
  document.getElementById('h3').textContent = `EDGES  ${edgeCount}`;
}

// ── לולאת ציור ──
let frameCount=0;
function drawLoop() {
  requestAnimationFrame(drawLoop);

  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  if (smoothX<0 || !irisOK) return;

  // ── נקודה פעילה — טקסטים ברורים ואדומים ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(smoothX, smoothY, REVEAL_R, 0, Math.PI*2);
  ctx.clip();

  ctx.font = 'bold 7px Courier New';
  ctx.textAlign = 'center';
  for(const lb of edgeLabels){
    const dist  = Math.hypot(lb.x - smoothX, lb.y - smoothY);
    if (dist > REVEAL_R) continue;
    const alpha = Math.max(0, 1 - dist/REVEAL_R);
    // אדום בוהק לנקודה הפעילה
    ctx.fillStyle = `rgba(255,30,30,${alpha * 0.95})`;
    ctx.fillText(lb.txt, lb.x, lb.y);
  }
  ctx.restore();

  // ── מעגל + צלב ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(smoothX, smoothY, REVEAL_R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,30,30,0.18)';
  ctx.lineWidth   = 0.8;
  ctx.stroke();

  ctx.fillStyle   = 'rgba(255,30,30,0.7)';
  ctx.beginPath();
  ctx.arc(smoothX, smoothY, 3, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,30,30,0.5)';
  ctx.lineWidth   = 0.7;
  ctx.beginPath();
  ctx.moveTo(smoothX-14, smoothY); ctx.lineTo(smoothX+14, smoothY);
  ctx.moveTo(smoothX, smoothY-14); ctx.lineTo(smoothX, smoothY+14);
  ctx.stroke();
  ctx.restore();

  frameCount++;
  if(frameCount%12===0) analyzeEdges();
}

// ── הפעלה ──
(async()=>{
  try{
    setMsg('טוענת מודל...');
    await loadModel();

    setMsg('מפעילה מצלמה...');
    await startCamera();

    vidEl.play().catch(()=>{});

    setMsg('הזיזי את העיניים — הנתונים יתגלו ✓', true);
    setTimeout(()=>{
      introEl.style.opacity='0';
      setTimeout(()=>introEl.style.display='none', 800);
    }, 1200);

    detectLoop();
    drawLoop();

  }catch(e){
    document.getElementById('h1').textContent='ERROR';
    setMsg('שגיאה: '+e.message);
    console.error(e);
  }
})();
</script>
</body>
</html>
