<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Eye Scan</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

  #bg-video {
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; z-index:0; display:none;
  }

  canvas { position:fixed; inset:0; z-index:1; background:transparent !important; }

  #cam { position:fixed; opacity:0; pointer-events:none; width:1px; height:1px; top:0; left:0; }

  #cal {
    position:fixed; inset:0; background:#fff;
    z-index:999; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:24px;
  }
  #cal h1 { font-size:10px; letter-spacing:.25em; color:#bbb; font-weight:400; text-transform:uppercase; }
  #cal p  { font-size:9px; color:#ccc; letter-spacing:.1em; line-height:2.2; text-align:center; max-width:300px; }
  #cal p b { color:#e03a2e; font-weight:400; }

  #cal-area { position:relative; width:360px; height:240px; border:.5px solid #eee; }

  .dot {
    position:absolute; width:22px; height:22px; border-radius:50%;
    background:#eee; border:1px solid #ddd;
    transform:translate(-50%,-50%); transition:all .15s;
  }
  .dot.active {
    background:#e03a2e; border-color:#e03a2e;
    animation:pulse .7s ease-in-out infinite;
  }
  .dot.done {
    background:#e03a2e; border-color:#e03a2e;
    transform:translate(-50%,-50%) scale(.55);
  }

  /* טיימר עיגולי סביב הנקודה הפעילה */
  .dot.active::after {
    content:'';
    position:absolute;
    inset:-6px;
    border-radius:50%;
    border:2px solid transparent;
    border-top-color:#e03a2e;
    animation:spin var(--dur, 2s) linear forwards;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%,100%{ transform:translate(-50%,-50%) scale(1); }
    50%    { transform:translate(-50%,-50%) scale(1.3); }
  }

  #cal-msg { font-size:9px; color:#bbb; letter-spacing:.1em; text-align:center; min-height:18px; }

  /* פס התקדמות */
  #progress-bar {
    width: 360px; height: 2px; background: #eee; display:none;
  }
  #progress-fill {
    height: 100%; width: 0%; background: #e03a2e;
    transition: width 0.1s linear;
  }

  #hud {
    position:fixed; bottom:16px; left:16px; z-index:10;
    font-size:8px; color:rgba(224,58,46,.4);
    letter-spacing:.13em; line-height:2.2; pointer-events:none;
  }
</style>
</head>
<body>

<video id="bg-video" loop muted playsinline>
  <source src="Roman_Statue_Rotation_Video.mp4" type="video/mp4">
</video>

<video id="cam" autoplay playsinline muted></video>

<div id="cal">
  <h1>Eye Scan — Iris Calibration</h1>
  <p>הסתכלי על כל <b>נקודה אדומה</b> ופשוט חכי — היא תירשם לבד אחרי 2 שניות.</p>
  <div id="cal-area"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="cal-msg">ממתינה לטעינת המצלמה...</div>
</div>

<div id="hud">
  <div id="h1">LOADING...</div>
  <div id="h2">IRIS — —</div>
  <div id="h3">GAZE — —</div>
  <div id="h4">ZONES 0 / 0</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script>

const COLS=5, ROWS=7, GAZE_R=110, FADE=0.09, BLUR_MAX=5.5;
const DWELL_TIME = 2000; // מילישניות להמתנה על כל נקודה

let gazeX=-1, gazeY=-1, irisRawX=0, irisRawY=0, irisOK=false, calModel=null;

// ── כיול ──
const CAL_PTS=[
  {sx:.15,sy:.15},{sx:.85,sy:.15},{sx:.50,sy:.50},{sx:.15,sy:.85},{sx:.85,sy:.85}
];
let calSamples=[], calStep=-1, calDots=[];
let dwellTimer=null, dwellStart=null, collectingDwell=false;

const calArea=document.getElementById('cal-area');
CAL_PTS.forEach((pt,i)=>{
  const d=document.createElement('div');
  d.className='dot';
  d.style.left=(pt.sx*100)+'%';
  d.style.top=(pt.sy*100)+'%';
  calArea.appendChild(d);
  calDots.push(d);
});

function activateDot(i){
  calStep=i;
  calDots.forEach((d,j)=>{
    d.classList.remove('active');
    if(j<i) d.classList.add('done');
  });
  if(i<calDots.length){
    calDots[i].classList.add('active');
    document.getElementById('cal-msg').textContent=`נקודה ${i+1}/5 — הסתכלי וחכי 2 שניות...`;
    document.getElementById('progress-bar').style.display='block';
    startDwell(i);
  }
}

function startDwell(i){
  // אוסף דגימות מרובות לאורך זמן ההמתנה לדיוק גבוה יותר
  collectingDwell=true;
  let samples=[];
  dwellStart=Date.now();

  const progressFill=document.getElementById('progress-fill');
  progressFill.style.width='0%';

  const tick=setInterval(()=>{
    const elapsed=Date.now()-dwellStart;
    const pct=Math.min(100,(elapsed/DWELL_TIME)*100);
    progressFill.style.width=pct+'%';

    // אוסף דגימה רק אם פנים מזוהות
    if(irisOK){
      samples.push({ix:irisRawX, iy:irisRawY});
    }

    if(elapsed>=DWELL_TIME){
      clearInterval(tick);
      collectingDwell=false;

      if(samples.length<5){
        // לא היו מספיק דגימות — נסי שוב
        document.getElementById('cal-msg').textContent='פנים לא מזוהות — נסי שוב, הסתכלי למצלמה';
        progressFill.style.width='0%';
        setTimeout(()=>startDwell(i), 800);
        return;
      }

      // ממוצע הדגימות = דיוק גבוה יותר
      const avgIx = samples.reduce((s,d)=>s+d.ix,0)/samples.length;
      const avgIy = samples.reduce((s,d)=>s+d.iy,0)/samples.length;

      calSamples.push({
        ix: avgIx,
        iy: avgIy,
        sx: CAL_PTS[i].sx*window.innerWidth,
        sy: CAL_PTS[i].sy*window.innerHeight
      });

      calDots[i].classList.remove('active');
      calDots[i].classList.add('done');

      if(i+1<CAL_PTS.length){
        setTimeout(()=>activateDot(i+1), 400);
      } else {
        buildModel();
      }
    }
  }, 50);
}

function buildModel(){
  const n=calSamples.length;
  let six=0,ssx=0,six2=0,sixsx=0,siy=0,ssy=0,siy2=0,siysy=0;
  calSamples.forEach(s=>{
    six+=s.ix; ssx+=s.sx; six2+=s.ix*s.ix; sixsx+=s.ix*s.sx;
    siy+=s.iy; ssy+=s.sy; siy2+=s.iy*s.iy; siysy+=s.iy*s.sy;
  });
  const ax=(n*sixsx-six*ssx)/(n*six2-six*six||1);
  const bx=(ssx-ax*six)/n;
  const ay=(n*siysy-siy*ssy)/(n*siy2-siy*siy||1);
  const by=(ssy-ay*siy)/n;
  calModel={ax,bx,ay,by};

  document.getElementById('progress-bar').style.display='none';
  document.getElementById('cal-msg').textContent='כיול הושלם ✓ מתחיל...';

  // מתחיל את החוויה אוטומטית אחרי שנייה
  setTimeout(startExp, 1000);
}

// ── MEDIAPIPE ──
const I={ri:468,li:473,ro:33,rin:133,lin:362,lo:263,rt:159,rb:145,lt:386,lb:374};
const camEl=document.getElementById('cam');

async function initFaceMesh(){
  const fm=new FaceMesh({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  fm.setOptions({maxNumFaces:1,refineLandmarks:true,
    minDetectionConfidence:.5,minTrackingConfidence:.5});
  fm.onResults(onFace);

  const stream=await navigator.mediaDevices.getUserMedia({
    video:{width:640,height:480,facingMode:'user'}
  });
  camEl.srcObject=stream;
  await new Promise(r=>camEl.addEventListener('loadeddata',r,{once:true}));

  const cam=new Camera(camEl,{
    onFrame:async()=>{ await fm.send({image:camEl}); },
    width:640,height:480
  });
  cam.start();

  document.getElementById('h1').textContent='IRIS TRACKING ACTIVE';
  document.getElementById('cal-msg').textContent='נקודה 1/5 — הסתכלי וחכי 2 שניות...';
  activateDot(0);
}

function onFace(res){
  if(!res.multiFaceLandmarks?.length){irisOK=false;return;}
  const lm=res.multiFaceLandmarks[0];
  if(lm.length<478){irisOK=false;return;}
  irisOK=true;

  const ri=lm[I.ri],li=lm[I.li];
  const ro=lm[I.ro],rin=lm[I.rin],lin=lm[I.lin],lo=lm[I.lo];
  const rt=lm[I.rt],rb=lm[I.rb],lt=lm[I.lt],lb=lm[I.lb];

  const rEW=Math.abs(rin.x-ro.x)||.001, lEW=Math.abs(lo.x-lin.x)||.001;
  const rEH=Math.abs(rb.y-rt.y)||.001,  lEH=Math.abs(lb.y-lt.y)||.001;

  irisRawX=-((ri.x-(ro.x+rin.x)/2)/rEW + (li.x-(lin.x+lo.x)/2)/lEW)/2;
  irisRawY= ((ri.y-(rt.y+rb.y)/2)/rEH  + (li.y-(lt.y+lb.y)/2)/lEH )/2;

  if(calModel){
    gazeX=Math.max(0,Math.min(window.innerWidth,  calModel.ax*irisRawX+calModel.bx));
    gazeY=Math.max(0,Math.min(window.innerHeight, calModel.ay*irisRawY+calModel.by));
  }

  document.getElementById('h2').textContent=`IRIS  ${irisRawX.toFixed(3)}  ${irisRawY.toFixed(3)}`;
  document.getElementById('h3').textContent=`GAZE  ${Math.round(gazeX)}  ${Math.round(gazeY)}`;
}

// ── VOCAB ──
const VOCAB=[
  ['VERTICAL','CONTRAST_HIGH','87%'],['HORIZONTAL','STAB_100','0.024s'],
  ['CRITICAL','MOTION_FAST','∆_0.003'],['DETAIL','BRIGHT_167','92%'],
  ['EDGES','CONTRAST_MED','0.031s'],['STATIC','STAB_88','∆_0.005'],
  ['MOTION →','BRIGHT_142','88%'],['CIRCLES','CAM_DIRECT','0.018s'],
  ['CURVES','CONTRAST_LOW','∆_0.002'],['CORNERS','MOTION_SLOW','0.027s'],
];
const SYMS=['%','→','∆','//'];
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function mkD(){const d=rnd(VOCAB);return{a:d[0],b:d[1],c:d[2],sym:rnd(SYMS),noise:(Math.random()*999).toFixed(3)+'s'};}

// ── START EXPERIENCE ──
function startExp(){
  document.getElementById('cal').style.display='none';
  const v=document.getElementById('bg-video');
  v.style.display='block';
  v.play().catch(e=>{ document.getElementById('h1').textContent='VIDEO ERR:'+e.message; });
  startSketch();
}

// ── p5 SKETCH ──
function startSketch(){
  new p5(p=>{
    let zones=[];

    p.setup=()=>{
      const cnv=p.createCanvas(window.innerWidth,window.innerHeight);
      cnv.style('background','transparent');
      p.textFont('Courier New');
      buildZones(p);
    };

    p.draw=()=>{
      p.clear();
      updateZones();
      drawZones(p);
      drawCursor(p);
      const v=zones.filter(z=>z.visited).length;
      document.getElementById('h4').textContent=`ZONES  ${v} / ${zones.length}`;
      document.getElementById('h1').textContent=irisOK?'IRIS ●':'IRIS ○';
    };

    p.windowResized=()=>{
      p.resizeCanvas(window.innerWidth,window.innerHeight);
      buildZones(p);
    };

    function buildZones(p){
      zones=[];
      const zW=p.width/COLS, zH=p.height/ROWS;
      for(let r=0;r<ROWS;r++)
        for(let c=0;c<COLS;c++)
          zones.push({x:c*zW,y:r*zH,w:zW,h:zH,reveal:0,visited:false,data:mkD()});
    }

    function updateZones(){
      if(gazeX<0) return;
      zones.forEach(z=>{
        const cx=z.x+z.w/2, cy=z.y+z.h/2;
        if(Math.hypot(gazeX-cx,gazeY-cy)<GAZE_R){
          z.visited=true;
          z.reveal=Math.min(1,z.reveal+FADE);
        }
        if(z.visited&&z.reveal<.10) z.reveal=.10;
      });
    }

    function drawZones(p){
      zones.forEach(z=>{
        if(!z.visited) return;
        const cx=z.x+z.w/2, cy=z.y+z.h/2;
        const prox=Math.max(0,1-Math.hypot(gazeX-cx,gazeY-cy)/GAZE_R);
        const here=prox>.05;
        const blur=here?0:BLUR_MAX;
        const alpha=here?z.reveal:z.reveal*.42;
        if(alpha<.02) return;

        const lx=z.x+10;
        bt(p,z.data.a, lx,z.y+z.h*.30, blur,    alpha,    18);
        bt(p,z.data.b, lx,z.y+z.h*.52, blur*1.2, alpha*.72, 9);
        bt(p,z.data.c, lx,z.y+z.h*.68, blur*1.5, alpha*.52, 11);
        if(here&&prox>.5){
          bt(p,z.data.sym,   lx,z.y+z.h*.82, 0,prox*alpha*.5, 8);
          bt(p,z.data.noise, lx,z.y+z.h*.92, 0,prox*.22,      7);
        }

        p.noFill();
        p.stroke(224,58,46,(here?35:9)*z.reveal);
        p.strokeWeight(.5);
        p.rect(z.x+1,z.y+1,z.w-2,z.h-2);
        p.noStroke();

        if(here&&prox>.5){
          p.stroke(224,58,46,prox*25); p.strokeWeight(.5);
          p.drawingContext.setLineDash([2,6]);
          p.line(z.x,cy,z.x+z.w,cy); p.line(cx,z.y,cx,z.y+z.h);
          p.drawingContext.setLineDash([]); p.noStroke();
        }
      });
    }

    function bt(p,txt,x,y,blur,alpha,sz){
      if(alpha<.01||!txt) return;
      p.textSize(sz); p.textAlign(p.LEFT,p.BASELINE);
      if(blur<.15){p.fill(224,58,46,alpha*255);p.text(txt,x,y);return;}
      for(let l=0;l<5;l++){
        const sp=blur*(l+1)*1.2;
        const a=Math.max(0,(alpha*255/5)*(1.1-l*.18));
        p.fill(224,58,46,a);
        p.text(txt,x+sp*.35,y+sp*.15);
        p.text(txt,x-sp*.35,y-sp*.15);
        p.text(txt,x,y);
      }
    }

    function drawCursor(p){
      if(gazeX<0||!irisOK) return;
      const t=p.millis()/1000;
      const r=GAZE_R*(.92+.05*Math.sin(t*2.2));
      p.noFill(); p.stroke(224,58,46,18); p.strokeWeight(.5);
      p.ellipse(gazeX,gazeY,r*2,r*2);
      p.noStroke(); p.fill(224,58,46,150);
      p.ellipse(gazeX,gazeY,5,5);
      p.stroke(224,58,46,65); p.strokeWeight(.5);
      p.line(gazeX-13,gazeY,gazeX+13,gazeY);
      p.line(gazeX,gazeY-13,gazeX,gazeY+13);
      p.noStroke();
    }
  });
}

// ── BOOT ──
initFaceMesh().catch(e=>{
  document.getElementById('h1').textContent='CAMERA ERROR';
  document.getElementById('cal-msg').textContent='שגיאת מצלמה: '+e.message;
});
</script>
</body>
</html>
