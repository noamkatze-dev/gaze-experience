<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Eye Scan</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

  #bg-video {
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; z-index:0; display:none;
  }

  canvas { position:fixed; inset:0; z-index:1; background:transparent !important; }

  #cam { position:fixed; opacity:0; pointer-events:none; width:1px; height:1px; top:0; left:0; }

  #cal {
    position:fixed; inset:0; background:#0a0a0a;
    z-index:999; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:28px;
  }

  #cal-title {
    font-size:9px; letter-spacing:.35em; color:#444;
    font-weight:400; text-transform:uppercase;
  }

  #cal-sub {
    font-size:9px; color:#333; letter-spacing:.1em;
    line-height:2.4; text-align:center; max-width:280px;
  }
  #cal-sub b { color:#e03a2e; font-weight:400; }

  #cal-area {
    position:relative; width:480px; height:300px;
    border:.5px solid #1a1a1a;
  }

  .dot {
    position:absolute; width:20px; height:20px; border-radius:50%;
    background:#1a1a1a; border:.5px solid #2a2a2a;
    transform:translate(-50%,-50%); transition:all .2s;
  }
  .dot.active {
    background:#e03a2e; border-color:#e03a2e;
    box-shadow: 0 0 0 0 rgba(224,58,46,0.4);
    animation: ripple 1s ease-out infinite;
  }
  .dot.done {
    background:#e03a2e; border-color:#e03a2e; opacity:.3;
    transform:translate(-50%,-50%) scale(.5);
  }

  @keyframes ripple {
    0%   { box-shadow: 0 0 0 0   rgba(224,58,46,0.4); }
    100% { box-shadow: 0 0 0 18px rgba(224,58,46,0);   }
  }

  #timer-bar { width:480px; height:1px; background:#1a1a1a; }
  #timer-fill { height:100%; width:0%; background:#e03a2e; transition: width .08s linear; }

  #cal-msg {
    font-size:8px; color:#2a2a2a; letter-spacing:.18em;
    text-align:center; min-height:16px; text-transform:uppercase;
  }
  #cal-msg.ok { color:#e03a2e; }

  #hud {
    position:fixed; bottom:16px; left:16px; z-index:10;
    font-size:7px; color:rgba(224,58,46,.3);
    letter-spacing:.15em; line-height:2.4; pointer-events:none;
    text-transform:uppercase;
  }
</style>
</head>
<body>

<video id="bg-video" loop muted playsinline>
  <source src="Roman_Statue_Rotation_Video.mp4" type="video/mp4">
</video>

<video id="cam" autoplay playsinline muted></video>

<div id="cal">
  <div id="cal-title">Eye Scan — Iris Calibration</div>
  <div id="cal-sub">הסתכלי על כל <b>נקודה אדומה</b><br>וחכי עד שתירשם לבד — 3 שניות בכל אחת</div>
  <div id="cal-area"></div>
  <div id="timer-bar"><div id="timer-fill"></div></div>
  <div id="cal-msg">טוענת מודל...</div>
</div>

<div id="hud">
  <div id="h1">LOADING</div>
  <div id="h2">IRIS — —</div>
  <div id="h3">GAZE — —</div>
  <div id="h4">ZONES 0 / 0</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script type="module">
import vision from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
const { FaceLandmarker, FilesetResolver } = vision;

const COLS=5, ROWS=7, GAZE_R=110, FADE=0.09, BLUR_MAX=5.5;
const DWELL = 3000;

let gazeX=-1, gazeY=-1;
let irisRawX=0, irisRawY=0, irisOK=false;
let calModel=null;
let faceLandmarker=null;

// 3 נקודות כיול בלבד
const CAL_PTS = [
  { sx:.15, sy:.15 },
  { sx:.85, sy:.85 },
  { sx:.50, sy:.50 },
];

let calSamples=[], calStep=-1, calDots=[];

const calArea = document.getElementById('cal-area');
CAL_PTS.forEach((pt, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.style.left = (pt.sx * 100) + '%';
  d.style.top  = (pt.sy * 100) + '%';
  calArea.appendChild(d);
  calDots.push(d);
});

async function loadModel() {
  const filesetResolver = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numFaces: 1,
    outputFaceBlendshapes: false,
  });
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width:640, height:480, facingMode:'user' }
  });
  const cam = document.getElementById('cam');
  cam.srcObject = stream;
  await new Promise(r => cam.addEventListener('loadeddata', r, { once:true }));
  return cam;
}

let lastTime = -1;
function detectLoop(cam) {
  const now = performance.now();
  if (lastTime !== cam.currentTime && faceLandmarker) {
    lastTime = cam.currentTime;
    const results = faceLandmarker.detectForVideo(cam, now);
    processResults(results);
  }
  requestAnimationFrame(() => detectLoop(cam));
}

function processResults(results) {
  if (!results.faceLandmarks || !results.faceLandmarks.length) {
    irisOK = false;
    document.getElementById('h1').textContent = 'IRIS ○';
    return;
  }

  const lm = results.faceLandmarks[0];
  if (lm.length < 478) { irisOK = false; return; }
  irisOK = true;

  const LI = [468,469,470,471,472];
  const RI = [473,474,475,476,477];
  const lIx = LI.reduce((s,i)=>s+lm[i].x,0)/5;
  const lIy = LI.reduce((s,i)=>s+lm[i].y,0)/5;
  const rIx = RI.reduce((s,i)=>s+lm[i].x,0)/5;
  const rIy = RI.reduce((s,i)=>s+lm[i].y,0)/5;

  const lEW = Math.abs(lm[133].x - lm[33].x)  || .001;
  const rEW = Math.abs(lm[263].x - lm[362].x) || .001;
  const lEH = Math.abs(lm[145].y - lm[159].y) || .001;
  const rEH = Math.abs(lm[374].y - lm[386].y) || .001;

  irisRawX = -(
    (lIx - (lm[33].x  + lm[133].x)/2) / lEW +
    (rIx - (lm[362].x + lm[263].x)/2) / rEW
  ) / 2;
  irisRawY = (
    (lIy - (lm[159].y + lm[145].y)/2) / lEH +
    (rIy - (lm[386].y + lm[374].y)/2) / rEH
  ) / 2;

  if (calModel) {
    gazeX = Math.max(0, Math.min(window.innerWidth,  calModel.ax * irisRawX + calModel.bx));
    gazeY = Math.max(0, Math.min(window.innerHeight, calModel.ay * irisRawY + calModel.by));
  }

  document.getElementById('h1').textContent = 'IRIS ●';
  document.getElementById('h2').textContent = `IRIS  ${irisRawX.toFixed(3)}  ${irisRawY.toFixed(3)}`;
  document.getElementById('h3').textContent = `GAZE  ${Math.round(gazeX)}  ${Math.round(gazeY)}`;
}

function activateDot(i) {
  calStep = i;
  calDots.forEach((d, j) => {
    d.classList.remove('active');
    if (j < i) d.classList.add('done');
  });
  if (i >= CAL_PTS.length) { buildModel(); return; }
  calDots[i].classList.add('active');
  setMsg(`נקודה ${i+1}/3 — הסתכלי וחכי...`);
  startDwell(i);
}

function startDwell(i) {
  const fill  = document.getElementById('timer-fill');
  const start = Date.now();
  let samples = [];
  fill.style.width = '0%';

  const tick = setInterval(() => {
    const elapsed = Date.now() - start;
    fill.style.width = Math.min(100, (elapsed / DWELL) * 100) + '%';
    if (irisOK) samples.push({ ix: irisRawX, iy: irisRawY });

    if (elapsed >= DWELL) {
      clearInterval(tick);
      if (samples.length < 10) {
        setMsg('פנים לא מזוהות — נסי שוב, הסתכלי למצלמה');
        fill.style.width = '0%';
        setTimeout(() => startDwell(i), 900);
        return;
      }
      const avgIx = samples.reduce((s,d)=>s+d.ix,0)/samples.length;
      const avgIy = samples.reduce((s,d)=>s+d.iy,0)/samples.length;
      calSamples.push({
        ix:avgIx, iy:avgIy,
        sx:CAL_PTS[i].sx * window.innerWidth,
        sy:CAL_PTS[i].sy * window.innerHeight
      });
      calDots[i].classList.remove('active');
      calDots[i].classList.add('done');
      setTimeout(() => activateDot(i+1), 400);
    }
  }, 60);
}

function buildModel() {
  const n = calSamples.length;
  let six=0,ssx=0,six2=0,sixsx=0,siy=0,ssy=0,siy2=0,siysy=0;
  calSamples.forEach(s => {
    six+=s.ix; ssx+=s.sx; six2+=s.ix*s.ix; sixsx+=s.ix*s.sx;
    siy+=s.iy; ssy+=s.sy; siy2+=s.iy*s.iy; siysy+=s.iy*s.sy;
  });
  const ax=(n*sixsx-six*ssx)/(n*six2-six*six||1);
  const bx=(ssx-ax*six)/n;
  const ay=(n*siysy-siy*ssy)/(n*siy2-siy*siy||1);
  const by=(ssy-ay*siy)/n;
  calModel={ax,bx,ay,by};
  document.getElementById('timer-bar').style.display='none';
  setMsg('כיול הושלם ✓', true);
  setTimeout(startExp, 900);
}

function setMsg(txt, ok=false) {
  const el = document.getElementById('cal-msg');
  el.textContent = txt;
  el.className = ok ? 'ok' : '';
}

function startExp() {
  document.getElementById('cal').style.display='none';
  const v = document.getElementById('bg-video');
  v.style.display='block';
  v.play().catch(()=>{});
  startSketch();
}

const VOCAB=[
  ['VERTICAL','CONTRAST_HIGH','87%'],['HORIZONTAL','STAB_100','0.024s'],
  ['CRITICAL','MOTION_FAST','∆_0.003'],['DETAIL','BRIGHT_167','92%'],
  ['EDGES','CONTRAST_MED','0.031s'],['STATIC','STAB_88','∆_0.005'],
  ['MOTION →','BRIGHT_142','88%'],['CIRCLES','CAM_DIRECT','0.018s'],
  ['CURVES','CONTRAST_LOW','∆_0.002'],['CORNERS','MOTION_SLOW','0.027s'],
];
const SYMS=['%','→','∆','//'];
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function mkD(){const d=rnd(VOCAB);return{a:d[0],b:d[1],c:d[2],sym:rnd(SYMS),noise:(Math.random()*999).toFixed(3)+'s'};}

function startSketch(){
  new p5(p=>{
    let zones=[];
    p.setup=()=>{
      const cnv=p.createCanvas(window.innerWidth,window.innerHeight);
      cnv.style('background','transparent');
      p.textFont('Courier New');
      buildZones(p);
    };
    p.draw=()=>{
      p.clear(); updateZones(); drawZones(p); drawCursor(p);
      document.getElementById('h4').textContent=`ZONES  ${zones.filter(z=>z.visited).length} / ${zones.length}`;
    };
    p.windowResized=()=>{ p.resizeCanvas(window.innerWidth,window.innerHeight); buildZones(p); };

    function buildZones(p){
      zones=[];
      const zW=p.width/COLS, zH=p.height/ROWS;
      for(let r=0;r<ROWS;r++)
        for(let c=0;c<COLS;c++)
          zones.push({x:c*zW,y:r*zH,w:zW,h:zH,reveal:0,visited:false,data:mkD()});
    }
    function updateZones(){
      if(gazeX<0) return;
      zones.forEach(z=>{
        const cx=z.x+z.w/2,cy=z.y+z.h/2;
        if(Math.hypot(gazeX-cx,gazeY-cy)<GAZE_R){z.visited=true;z.reveal=Math.min(1,z.reveal+FADE);}
        if(z.visited&&z.reveal<.10) z.reveal=.10;
      });
    }
    function drawZones(p){
      zones.forEach(z=>{
        if(!z.visited) return;
        const cx=z.x+z.w/2,cy=z.y+z.h/2;
        const prox=Math.max(0,1-Math.hypot(gazeX-cx,gazeY-cy)/GAZE_R);
        const here=prox>.05,blur=here?0:BLUR_MAX,alpha=here?z.reveal:z.reveal*.42;
        if(alpha<.02) return;
        const lx=z.x+10;
        bt(p,z.data.a,lx,z.y+z.h*.30,blur,alpha,18);
        bt(p,z.data.b,lx,z.y+z.h*.52,blur*1.2,alpha*.72,9);
        bt(p,z.data.c,lx,z.y+z.h*.68,blur*1.5,alpha*.52,11);
        if(here&&prox>.5){
          bt(p,z.data.sym,lx,z.y+z.h*.82,0,prox*alpha*.5,8);
          bt(p,z.data.noise,lx,z.y+z.h*.92,0,prox*.22,7);
        }
        p.noFill();p.stroke(224,58,46,(here?35:9)*z.reveal);p.strokeWeight(.5);
        p.rect(z.x+1,z.y+1,z.w-2,z.h-2);p.noStroke();
        if(here&&prox>.5){
          p.stroke(224,58,46,prox*25);p.strokeWeight(.5);
          p.drawingContext.setLineDash([2,6]);
          p.line(z.x,cy,z.x+z.w,cy);p.line(cx,z.y,cx,z.y+z.h);
          p.drawingContext.setLineDash([]);p.noStroke();
        }
      });
    }
    function bt(p,txt,x,y,blur,alpha,sz){
      if(alpha<.01||!txt) return;
      p.textSize(sz);p.textAlign(p.LEFT,p.BASELINE);
      if(blur<.15){p.fill(224,58,46,alpha*255);p.text(txt,x,y);return;}
      for(let l=0;l<5;l++){
        const sp=blur*(l+1)*1.2,a=Math.max(0,(alpha*255/5)*(1.1-l*.18));
        p.fill(224,58,46,a);
        p.text(txt,x+sp*.35,y+sp*.15);p.text(txt,x-sp*.35,y-sp*.15);p.text(txt,x,y);
      }
    }
    function drawCursor(p){
      if(gazeX<0||!irisOK) return;
      const t=p.millis()/1000,r=GAZE_R*(.92+.05*Math.sin(t*2.2));
      p.noFill();p.stroke(224,58,46,18);p.strokeWeight(.5);p.ellipse(gazeX,gazeY,r*2,r*2);
      p.noStroke();p.fill(224,58,46,150);p.ellipse(gazeX,gazeY,5,5);
      p.stroke(224,58,46,65);p.strokeWeight(.5);
      p.line(gazeX-13,gazeY,gazeX+13,gazeY);p.line(gazeX,gazeY-13,gazeX,gazeY+13);
      p.noStroke();
    }
  });
}

(async()=>{
  try{
    setMsg('טוענת מודל...');
    await loadModel();
    setMsg('מפעילה מצלמה...');
    const cam=await startCamera();
    detectLoop(cam);
    setMsg('נקודה 1/3 — הסתכלי וחכי...');
    activateDot(0);
  }catch(e){
    document.getElementById('h1').textContent='ERROR';
    setMsg('שגיאה: '+e.message);
  }
})();
</script>
</body>
</html>
